<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESCS Supply Chain Provenance</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Times New Roman", Times, serif; background: #f8f8f6; color: #1a1a1a; font-size: 15px; line-height: 1.5; }
    .header { background: #0a2d5e; color: #fff; padding: 18px 40px; display: flex; align-items: baseline; justify-content: space-between; border-bottom: 3px solid #c8a84b; }
    .header-title { font-size: 22px; font-weight: normal; letter-spacing: 0.04em; }
    .header-sub { font-size: 12px; color: #a8c0e0; letter-spacing: 0.08em; text-transform: uppercase; }
    .header-node { font-size: 11px; color: #7aa0cc; font-family: "Courier New", monospace; }
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 40px; }
    .search-section { background: #fff; border: 1px solid #c8d4e0; border-top: 3px solid #0a2d5e; padding: 24px 28px; margin-bottom: 28px; }
    .search-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #4a6080; display: block; margin-bottom: 8px; }
    .search-row { display: flex; gap: 10px; }
    .search-input { flex: 1; font-family: "Times New Roman", Times, serif; font-size: 15px; border: 1px solid #b0bece; padding: 9px 13px; color: #1a1a1a; background: #fbfcfd; outline: none; }
    .search-input:focus { border-color: #0a2d5e; }
    .search-btn { font-family: "Times New Roman", Times, serif; font-size: 14px; background: #0a2d5e; color: #fff; border: none; padding: 9px 24px; cursor: pointer; letter-spacing: 0.04em; }
    .search-btn:hover { background: #0d3a78; }
    .status-bar { display: flex; gap: 32px; margin-bottom: 28px; padding: 14px 0; border-bottom: 1px solid #d0d8e0; }
    .status-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #607080; display: block; }
    .status-value { font-size: 20px; color: #0a2d5e; }
    .status-value.alert { color: #8b1a1a; }
    .status-value.ok { color: #1a5e2a; }
    .panel { background: #fff; border: 1px solid #c8d4e0; margin-bottom: 20px; }
    .panel-header { background: #f0f4f8; border-bottom: 1px solid #c8d4e0; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
    .panel-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #0a2d5e; font-weight: normal; }
    .panel-body { padding: 20px; }
    .chain-event { display: flex; align-items: flex-start; position: relative; }
    .chain-event:not(:last-child)::before { content: ''; position: absolute; left: 16px; top: 32px; bottom: -8px; width: 1px; background: #c8d4e0; }
    .chain-dot-col { width: 34px; display: flex; flex-direction: column; align-items: center; padding-top: 6px; flex-shrink: 0; }
    .chain-dot { width: 10px; height: 10px; border-radius: 50%; background: #0a2d5e; border: 2px solid #0a2d5e; }
    .chain-dot.breach { background: #8b1a1a; border-color: #8b1a1a; }
    .chain-dot.recall { background: #8b4a00; border-color: #8b4a00; }
    .chain-dot.cert { background: #1a5e2a; border-color: #1a5e2a; }
    .chain-dot.sensor { background: #4a6080; border-color: #4a6080; }
    .chain-content { flex: 1; padding: 4px 0 20px 12px; }
    .chain-kind { font-size: 13px; color: #0a2d5e; font-style: italic; }
    .chain-kind.breach { color: #8b1a1a; }
    .chain-kind.recall { color: #8b4a00; }
    .chain-kind.cert { color: #1a5e2a; }
    .chain-meta { font-size: 11px; color: #607080; margin-top: 2px; }
    .chain-detail { font-size: 12px; color: #304050; margin-top: 4px; }
    .chain-witnesses { font-size: 11px; color: #1a5e2a; margin-top: 2px; }
    .chain-contested { font-size: 11px; color: #8b1a1a; margin-top: 2px; }
    .chain-digest { font-family: "Courier New", monospace; font-size: 10px; color: #a0b0c0; margin-top: 3px; }
    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: #c8d4e0; border: 1px solid #c8d4e0; margin-bottom: 20px; }
    .summary-cell { background: #fff; padding: 16px 18px; }
    .summary-cell-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #607080; display: block; margin-bottom: 4px; }
    .summary-cell-value { font-size: 22px; color: #0a2d5e; }
    .summary-cell-value.alert { color: #8b1a1a; }
    .summary-cell-value.ok { color: #1a5e2a; }
    .recall-banner { background: #fff8f0; border: 1px solid #c8a000; border-left: 4px solid #8b4a00; padding: 14px 20px; margin-bottom: 20px; display: none; }
    .recall-banner.active { display: block; }
    .recall-banner-title { font-size: 13px; color: #8b4a00; text-transform: uppercase; margin-bottom: 4px; }
    .breach-banner { background: #fff0f0; border: 1px solid #c8a0a0; border-left: 4px solid #8b1a1a; padding: 14px 20px; margin-bottom: 20px; display: none; }
    .breach-banner.active { display: block; }
    .breach-banner-title { font-size: 13px; color: #8b1a1a; text-transform: uppercase; margin-bottom: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #607080; font-weight: normal; text-align: left; padding: 8px 12px; border-bottom: 1px solid #c8d4e0; background: #f4f7fa; }
    td { padding: 8px 12px; border-bottom: 1px solid #e8eef4; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f4f8fc; }
    .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border: 1px solid; letter-spacing: 0.06em; text-transform: uppercase; }
    .badge-blue { color: #0a2d5e; border-color: #0a2d5e; background: #f0f4f8; }
    .badge-green { color: #1a5e2a; border-color: #1a5e2a; background: #f0f8f2; }
    .badge-red { color: #8b1a1a; border-color: #8b1a1a; background: #fff0f0; }
    .badge-amber { color: #8b4a00; border-color: #8b4a00; background: #fff8f0; }
    .badge-gray { color: #607080; border-color: #a0b0c0; background: #f4f6f8; }
    .loading { text-align: center; padding: 40px; color: #607080; font-style: italic; }
    .error-msg { color: #8b1a1a; font-size: 13px; padding: 12px 16px; background: #fff0f0; border: 1px solid #d0a0a0; }
    .empty { text-align: center; padding: 48px; color: #8090a0; font-style: italic; }
    .footer { margin-top: 48px; padding-top: 16px; border-top: 1px solid #d0d8e0; font-size: 11px; color: #8090a0; display: flex; justify-content: space-between; }
    .mono { font-family: "Courier New", monospace; font-size: 11px; color: #4a6080; }
    .custody-arrow { color: #0a2d5e; margin: 0 6px; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">ESCS &mdash; Epistemic Supply Chain Substrate</div>
    <div class="header-sub">Provenance &amp; Compliance Dashboard</div>
  </div>
  <div class="header-node" id="node-id">Connecting...</div>
</div>

<div class="container">

  <div class="search-section">
    <label class="search-label">Batch Identifier</label>
    <div class="search-row">
      <input class="search-input" id="batch-input" type="text"
        placeholder="batch:LOT-2025-0042" autocomplete="off" />
      <button class="search-btn" onclick="loadProvenance()">Query Provenance</button>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-item">
      <span class="status-label">Anka Mesh</span>
      <span class="status-value" id="mesh-status">&#8212;</span>
    </div>
    <div class="status-item">
      <span class="status-label">Claims on Mesh</span>
      <span class="status-value" id="mesh-claims">&#8212;</span>
    </div>
    <div class="status-item">
      <span class="status-label">Witnesses</span>
      <span class="status-value" id="mesh-witnesses">&#8212;</span>
    </div>
    <div class="status-item">
      <span class="status-label">Adapter</span>
      <span class="status-value" id="adapter-status">&#8212;</span>
    </div>
  </div>

  <div id="results"></div>

  <div class="footer">
    <span>ESCS &mdash; Epistemic Supply Chain Substrate</span>
    <span id="footer-time"></span>
  </div>

</div>

<script>
  const ADAPTER = ''
  const ANKA    = '/anka'

  function ts(unix) {
    if (!unix) return '&#8212;'
    return new Date(unix * 1000).toISOString().replace('T', ' ').slice(0, 19) + ' UTC'
  }

  function shortDigest(d) {
    if (!d) return '&#8212;'
    return d.slice(0, 16) + '...'
  }

  function eventClass(kind) {
    if (kind === 'temperature_breach') return 'breach'
    if (kind && kind.startsWith('recall')) return 'recall'
    if (kind && kind.startsWith('certification')) return 'cert'
    if (kind === 'temperature_log' || kind === 'sensor_reading') return 'sensor'
    return ''
  }

  function badge(text, cls) {
    return '<span class="badge badge-' + cls + '">' + text + '</span>'
  }

  function kindBadge(kind) {
    const map = {
      batch_created:         ['batch created',    'blue'],
      custody_transfer:      ['custody',          'blue'],
      inspection_passed:     ['inspection ok',    'green'],
      inspection_failed:     ['inspection fail',  'red'],
      customs_cleared:       ['customs ok',       'green'],
      customs_held:          ['customs hold',     'amber'],
      temperature_log:       ['temp log',         'gray'],
      temperature_breach:    ['temp breach',      'red'],
      certification_issued:  ['certified',        'green'],
      certification_revoked: ['cert revoked',     'red'],
      recall_issued:         ['recall issued',    'amber'],
      recall_acknowledged:   ['recall ack',       'amber'],
      recall_resolved:       ['recall resolved',  'green'],
      sensor_reading:        ['sensor',           'gray'],
      location_update:       ['location',         'gray'],
      origin_attested:       ['origin',           'blue'],
    }
    const entry = map[kind] || [kind, 'gray']
    return badge(entry[0], entry[1])
  }

  async function checkHealth() {
    try {
      const r = await fetch('/adapter/health')
      const d = await r.json()
      document.getElementById('adapter-status').textContent = d.ok ? 'Online' : 'Error'
      document.getElementById('adapter-status').className = 'status-value ' + (d.ok ? 'ok' : 'alert')
      if (d.node_id) document.getElementById('node-id').textContent = d.node_id.slice(0, 30) + '...'
    } catch(e) {
      document.getElementById('adapter-status').textContent = 'Offline'
      document.getElementById('adapter-status').className = 'status-value alert'
      document.getElementById('node-id').textContent = 'Adapter offline'
    }
    try {
      const r = await fetch('/anka/health')
      const d = await r.json()
      document.getElementById('mesh-status').textContent = d.ok ? 'Online' : 'Error'
      document.getElementById('mesh-status').className = 'status-value ' + (d.ok ? 'ok' : 'alert')
      const cnt = d.claim_count ?? (d.stats && d.stats.claim_count)
      const wit = d.witness_count ?? (d.stats && d.stats.witness_count)
      document.getElementById('mesh-claims').textContent = cnt != null ? cnt : '&#8212;'
      document.getElementById('mesh-witnesses').textContent = wit != null ? wit : '&#8212;'
    } catch(e) {
      document.getElementById('mesh-status').textContent = 'Offline'
      document.getElementById('mesh-status').className = 'status-value alert'
    }
  }

  const KINDS_SPACES = [
    { kind: 'batch_created',         space: 'SUPPLY.BATCH.v1' },
    { kind: 'batch_split',           space: 'SUPPLY.BATCH.v1' },
    { kind: 'custody_transfer',      space: 'SUPPLY.CUSTODY.v1' },
    { kind: 'inspection_passed',     space: 'SUPPLY.INSPECTION.v1' },
    { kind: 'inspection_failed',     space: 'SUPPLY.INSPECTION.v1' },
    { kind: 'temperature_log',       space: 'PHARMA.COLD.FDA.v1' },
    { kind: 'temperature_log',       space: 'FOOD.COLD.v1' },
    { kind: 'temperature_log',       space: 'SUPPLY.SENSOR.v1' },
    { kind: 'temperature_breach',    space: 'SUPPLY.SENSOR.v1' },
    { kind: 'customs_cleared',       space: 'SUPPLY.CUSTOMS.US.v1' },
    { kind: 'customs_cleared',       space: 'SUPPLY.CUSTOMS.EU.v1' },
    { kind: 'customs_cleared',       space: 'SUPPLY.CUSTOMS.UK.v1' },
    { kind: 'certification_issued',  space: 'SUPPLY.ISO9001.v1' },
    { kind: 'certification_revoked', space: 'SUPPLY.ISO9001.v1' },
    { kind: 'recall_issued',         space: 'SUPPLY.RECALL.v1' },
    { kind: 'recall_issued',         space: 'PHARMA.RECALL.v1' },
    { kind: 'recall_acknowledged',   space: 'SUPPLY.CUSTODY.v1' },
    { kind: 'recall_resolved',       space: 'SUPPLY.CUSTODY.v1' },
    { kind: 'origin_attested',       space: 'SUPPLY.ORACLE.v1' },
    { kind: 'sensor_reading',        space: 'SUPPLY.SENSOR.v1' },
    { kind: 'location_update',       space: 'SUPPLY.STATE.v1' },
  ]

  async function queryAnka(space, subject) {
    try {
      const r = await fetch(ANKA + '/query/' + space + '/' + subject)
      if (!r.ok) return []
      const d = await r.json()
      const digests = (d.plural && d.plural.retained_digests) || []
      return digests.map(function(digest) { return { digest, space } })
    } catch(e) { return [] }
  }

  async function loadProvenance() {
    const batchId = document.getElementById('batch-input').value.trim()
    if (!batchId) return
    const results = document.getElementById('results')
    results.innerHTML = '<div class="loading">Querying Anka mesh...</div>'

    try {
      // Query all known event kinds in parallel
      const promises = KINDS_SPACES.map(function(ks) {
        const subject = 'sc:' + ks.kind + ':' + batchId
        return queryAnka(ks.space, subject).then(function(hits) {
          return hits.map(function(h) {
            return {
              event_kind: ks.kind,
              claim_space: ks.space,
              digest_hex: h.digest,
              subject: subject,
              timestamp_unix_secs: 0,
              witness_count: 0,
              challenge_count: 0,
              contested: false,
              object: {}
            }
          })
        })
      })

      const arrays = await Promise.all(promises)
      const chain = [].concat.apply([], arrays)

      // Deduplicate by digest
      const seen = {}
      const unique = chain.filter(function(e) {
        if (seen[e.digest_hex]) return false
        seen[e.digest_hex] = true
        return true
      })

      const recalls = unique.filter(function(e) { return e.event_kind === 'recall_issued' })

      const prov = {
        batch_id: batchId,
        chain: unique,
        chain_length: unique.length,
        recalls: recalls,
        recall_count: recalls.length,
        under_recall: recalls.length > 0,
        current_holder: '',
        chain_integrity: true,
        total_witnesses: 0,
        total_challenges: 0,
        contested: false
      }

      if (unique.length === 0) {
        results.innerHTML = '<div class="empty">No events found on the Anka mesh for batch: ' + batchId + '</div>'
      } else {
        renderProvenance(prov)
      }
    } catch(e) {
      results.innerHTML = '<div class="error-msg">Failed to load provenance: ' + e.message + '</div>'
    }
  }

  function renderProvenance(prov) {
    const html = []

    if (prov.under_recall) {
      html.push('<div class="recall-banner active"><div class="recall-banner-title">Active Recall</div><div>' +
        'This batch is subject to ' + prov.recall_count + ' active recall(s).</div></div>')
    }

    const hasBreach = prov.chain && prov.chain.some(function(e) { return e.event_kind === 'temperature_breach' })
    if (hasBreach) {
      html.push('<div class="breach-banner active"><div class="breach-banner-title">Temperature Breach Detected</div>' +
        '<div>One or more temperature excursions recorded in this batch history.</div></div>')
    }

    const integrity = prov.chain_integrity ? badge('Verified', 'green') : badge('Compromised', 'red')
    const recallBadge = prov.under_recall ? badge('Under Recall', 'amber') : badge('No Recall', 'green')
    const contested = prov.contested ? badge('Contested', 'red') : badge('Clean', 'green')

    html.push('<div class="summary-grid">' +
      '<div class="summary-cell"><span class="summary-cell-label">Batch</span>' +
        '<div style="font-size:13px;color:#0a2d5e;margin-top:4px;word-break:break-all">' + (prov.batch_id || '&#8212;') + '</div></div>' +
      '<div class="summary-cell"><span class="summary-cell-label">Current Holder</span>' +
        '<div style="font-size:13px;margin-top:4px">' + (prov.current_holder || '&#8212;') + '</div></div>' +
      '<div class="summary-cell"><span class="summary-cell-label">Chain Events</span>' +
        '<span class="summary-cell-value">' + (prov.chain_length || 0) + '</span></div>' +
      '<div class="summary-cell"><span class="summary-cell-label">Witnesses</span>' +
        '<span class="summary-cell-value">' + (prov.total_witnesses || 0) + '</span></div>' +
      '<div class="summary-cell"><span class="summary-cell-label">Challenges</span>' +
        '<span class="summary-cell-value' + (prov.total_challenges > 0 ? ' alert' : '') + '">' + (prov.total_challenges || 0) + '</span></div>' +
      '<div class="summary-cell"><span class="summary-cell-label">Chain Integrity</span><div style="margin-top:6px">' + integrity + '</div></div>' +
      '<div class="summary-cell"><span class="summary-cell-label">Recall Status</span><div style="margin-top:6px">' + recallBadge + '</div></div>' +
      '<div class="summary-cell"><span class="summary-cell-label">Contested</span><div style="margin-top:6px">' + contested + '</div></div>' +
      '</div>')

    html.push('<div class="panel"><div class="panel-header">' +
      '<span class="panel-title">Provenance Chain</span>' +
      '<span class="mono">' + (prov.chain_length || 0) + ' events</span>' +
      '</div><div class="panel-body">')

    if (!prov.chain || prov.chain.length === 0) {
      html.push('<div class="empty">No events found on the Anka mesh for this batch.</div>')
    } else {
      html.push('<div class="chain">')
      prov.chain.forEach(function(event) {
        const cls = eventClass(event.event_kind)
        const obj = event.object || {}
        let detail = ''
        if (event.event_kind === 'custody_transfer') {
          detail = '<span class="mono">' + (obj.from_party || '&#8212;') + '</span>' +
            '<span class="custody-arrow">&rarr;</span>' +
            '<span class="mono">' + (obj.to_party || '&#8212;') + '</span>'
        } else if (event.event_kind === 'temperature_breach') {
          detail = 'Peak: ' + (obj.temp_c || '&#8212;') + '&deg;C &nbsp;|&nbsp; ' +
            'Threshold: ' + (obj.threshold_min_c || '&#8212;') + '&ndash;' + (obj.threshold_max_c || '&#8212;') + '&deg;C'
        } else if (event.event_kind === 'temperature_log') {
          const s = obj.stats
          if (s) detail = 'Min: ' + s.min + '&deg;C &nbsp; Max: ' + s.max + '&deg;C &nbsp; Readings: ' + s.count
          else if (obj.temp_min_c !== undefined) detail = 'Min: ' + obj.temp_min_c + '&deg;C &nbsp; Max: ' + obj.temp_max_c + '&deg;C'
        } else if (event.event_kind === 'certification_issued') {
          detail = 'Type: ' + (obj.cert_type || '&#8212;') + ' &nbsp;|&nbsp; Ref: ' + (obj.cert_ref || '&#8212;')
        } else if (event.event_kind === 'inspection_passed' || event.event_kind === 'inspection_failed') {
          detail = 'Inspector: ' + (obj.inspector_id || '&#8212;')
        } else if (event.event_kind === 'customs_cleared') {
          detail = 'Ref: ' + (obj.clearance_ref || '&#8212;') + ' &nbsp;|&nbsp; Port: ' + (obj.port_of_entry || '&#8212;')
        } else if (event.event_kind && event.event_kind.indexOf('recall') === 0) {
          detail = 'Recall: ' + (obj.recall_id || '&#8212;')
          if (obj.severity) detail += ' &nbsp;|&nbsp; Severity: ' + obj.severity
        } else if (event.event_kind === 'batch_created') {
          detail = 'Product: ' + (obj.product_code || '&#8212;') + ' &nbsp;|&nbsp; Lot: ' + (obj.lot_number || '&#8212;')
        } else if (event.event_kind === 'origin_attested') {
          detail = 'Country: ' + (obj.country_of_origin || '&#8212;')
        }

        html.push('<div class="chain-event">' +
          '<div class="chain-dot-col"><div class="chain-dot ' + cls + '"></div></div>' +
          '<div class="chain-content">' +
            '<div>' + kindBadge(event.event_kind) +
              '<span style="margin-left:8px;font-size:11px;color:#8090a0">' + ts(event.timestamp_unix_secs) + '</span></div>' +
            '<div class="chain-kind ' + cls + '">' + (event.event_kind || '') + '</div>' +
            (detail ? '<div class="chain-detail">' + detail + '</div>' : '') +
            (event.witness_count > 0 ? '<div class="chain-witnesses">&#10003; ' + event.witness_count + ' witness' + (event.witness_count > 1 ? 'es' : '') + '</div>' : '') +
            (event.contested ? '<div class="chain-contested">&#9888; ' + event.challenge_count + ' challenge' + (event.challenge_count > 1 ? 's' : '') + '</div>' : '') +
            '<div class="chain-digest">' + (event.digest_hex || '') + '</div>' +
          '</div></div>')
      })
      html.push('</div>')
    }
    html.push('</div></div>')

    if (prov.recalls && prov.recalls.length > 0) {
      html.push('<div class="panel"><div class="panel-header">' +
        '<span class="panel-title">Recall History</span>' +
        '<span class="mono">' + prov.recalls.length + ' recall event(s)</span>' +
        '</div><div class="panel-body" style="padding:0"><table><thead><tr>' +
        '<th>Event</th><th>Recall ID</th><th>Severity</th><th>Timestamp</th><th>Digest</th>' +
        '</tr></thead><tbody>')
      prov.recalls.forEach(function(r) {
        const obj = r.object || {}
        html.push('<tr>' +
          '<td>' + kindBadge(r.event_kind) + '</td>' +
          '<td class="mono">' + (obj.recall_id || '&#8212;') + '</td>' +
          '<td>' + (obj.severity ? badge(obj.severity, obj.severity === 'class_i' ? 'red' : 'amber') : '&#8212;') + '</td>' +
          '<td style="font-size:12px;color:#607080">' + ts(r.timestamp_unix_secs) + '</td>' +
          '<td class="mono" style="font-size:10px;color:#a0b0c0">' + shortDigest(r.digest_hex) + '</td>' +
          '</tr>')
      })
      html.push('</tbody></table></div></div>')
    }

    document.getElementById('results').innerHTML = html.join('')
  }

  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('batch-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') loadProvenance()
    })
    document.getElementById('footer-time').textContent =
      new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC'
    checkHealth()
    setInterval(checkHealth, 30000)
  })
</script>
</body>
</html>
